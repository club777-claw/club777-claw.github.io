name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.146.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Seoul
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Submit to IndexNow
        run: |
          KEY="d38cbcf439ae2df6f747302a1ad9aaaa"
          SITE="https://club777-claw.github.io"
          # 최근 변경된 포스트 URL 추출 (최대 20개)
          URLS=$(curl -s "${SITE}/sitemap.xml" | grep -oP '<loc>\K[^<]+' | head -20)
          URL_ARRAY=$(echo "$URLS" | python3 -c "import sys,json; urls=[u.strip() for u in sys.stdin if u.strip()]; print(json.dumps(urls))")
          PAYLOAD=$(python3 -c "
          import json
          payload = {
            'host': 'club777-claw.github.io',
            'key': '${KEY}',
            'keyLocation': '${SITE}/${KEY}.txt',
            'urlList': $URL_ARRAY
          }
          print(json.dumps(payload))
          ")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "IndexNow response: $STATUS"
